{{- if not .Values.externalSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "proxy-vpn.envSecretName" . }}
  labels: {{- include "proxy-vpn.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $k, $v := .Values.env }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
