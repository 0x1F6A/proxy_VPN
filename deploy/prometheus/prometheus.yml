global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: dev
    cluster: proxy_vpn

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # api 在宿主机直接 go run 时，可通过 host.docker.internal 抓取
  - job_name: proxy_vpn_api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: api
