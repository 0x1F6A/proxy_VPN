app:
  name: proxy_VPN
  env: dev

http:
  addr: ":8080"

log:
  level: info
  format: json

mysql:
  dsn: "root:root@tcp(127.0.0.1:3306)/proxy_vpn?charset=utf8mb4&parseTime=true&loc=UTC"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 1h

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

jwt:
  # Phase 0 placeholder — overridden by PROXYVPN_JWT__SECRET in real envs.
  secret: "change-me-in-production-please"
  access_ttl: 2h
  refresh_ttl: 168h
  issuer: "proxy_VPN"
  allowed_clock_skew: 30s

smtp:
  # Dev: docker-compose ships MailHog on 1025 (no auth/TLS).
  host: "127.0.0.1"
  port: 1025
  username: ""
  password: ""
  from: "no-reply@proxy-vpn.local"
  use_tls: false

rate:
  send_code_per_email_min: 1   # at most 1 send per minute per (scene,email)
  login_fail_per_ip_min: 10    # at most 10 failed logins per minute per IP
