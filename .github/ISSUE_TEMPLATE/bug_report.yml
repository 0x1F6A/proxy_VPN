name: Bug report
description: Report a defect in proxy_VPN
labels: [bug, triage]
body:
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v0.1.0 or commit sha
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots (please redact secrets)
