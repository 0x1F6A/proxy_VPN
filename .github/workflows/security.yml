name: Security scan

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run gosec
        uses: securego/gosec@master
        with:
          # Exclusions rationale:
          #   G115 (int overflow on conversion) — false positives flood from
          #     gosec's broad rule that triggers on every typed numeric cast.
          #     All concrete sites in this repo are bounded values (status
          #     enums, GB→bytes math, time.Now().UnixNano() seed bytes).
          #   cmd/node-agent — runs only on operator-controlled hosts and
          #     intentionally uses math/rand for telemetry simulation, exec
          #     for xray reload, and 0644 file perms for config drops. The
          #     inputs come from the central API over an mTLS-style
          #     bootstrap secret, not from untrusted users.
          args: -exclude=G115 -exclude-dir=cmd/node-agent ./...

  trivy:
    name: trivy fs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "0"
