name: Release

# Triggered by semver tags. Builds & pushes one image per cmd/ entrypoint
# to GHCR, then packages the Helm chart and uploads it as a release asset.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # for GH release asset upload
  packages: write   # for GHCR push

jobs:
  images:
    name: Build & push images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bin: [api, worker, node-agent, usdt-watcher, admin, user-web]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          ref="${GITHUB_REF_NAME}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/proxy-vpn-${{ matrix.bin }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.bin == 'admin' && 'deploy/Dockerfile.admin' || matrix.bin == 'user-web' && 'deploy/Dockerfile.user-web' || 'deploy/Dockerfile' }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            BIN=${{ matrix.bin }}
            VERSION=${{ steps.ver.outputs.version }}
            COMMIT=${{ steps.ver.outputs.commit }}
            DATE=${{ steps.ver.outputs.date }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.bin }}
          cache-to: type=gha,mode=max,scope=${{ matrix.bin }}

  helm:
    name: Package & upload Helm chart
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: helm lint
        run: helm lint deploy/helm/proxy-vpn

      - name: helm package
        run: |
          helm package deploy/helm/proxy-vpn \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}" \
            --destination dist/

      - name: Upload chart asset to GH release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz
          generate_release_notes: true

      - name: Push chart to GHCR (OCI)
        env:
          OWNER_LC: ${{ github.repository_owner }}
        run: |
          owner_lc=$(echo "$OWNER_LC" | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push dist/*.tgz "oci://ghcr.io/${owner_lc}/charts"
